# HomeHoard — Overview dashboard
# ==============================
# The HomeHoard HACS integration ships a custom Lovelace card and auto-registers
# it (no manual resource needed). Everything — stats, quick actions (find /
# lend / scan), checked-out list, recent items, and locations — lives in ONE
# card that calls the homehoard.* services directly (no input_text/script
# helpers required).
#
# ── Option A (recommended): the custom card ──────────────────────────────────
# Add Card → search "HomeHoard", or paste this anywhere on your Overview:
#
#   type: custom:homehoard-card
#   # all optional:
#   title: HomeHoard
#   app_path: /hassio/ingress/b3264f33_homehoard   # Open / Scan button target
#   prefix: sensor.homehoard_                        # entity-id prefix
#
# As its own tab (Dashboard → ⋮ Edit → ⋮ Raw configuration editor):
views:
  - title: HomeHoard
    path: homehoard
    icon: mdi:package-variant-closed
    cards:
      - type: custom:homehoard-card
        title: HomeHoard

# ── Option B: plain core-Lovelace cards (no custom card) ─────────────────────
# If you'd rather not use the custom card, the equivalent built-in cards are in
# docs/ha/overview_dashboard_core.yaml, which needs docs/ha/overview_package.yaml
# (the input_text + script helpers) installed.
