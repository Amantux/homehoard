locate:
  name: Locate
  description: >-
    Find items, bins, or locations in HomeHoard and where they are. Returns a
    structured result plus a ready-to-speak sentence — handy for notifications,
    messaging (Telegram, etc.), and voice.
  fields:
    query:
      name: Query
      description: What to look for (name, label, brand, model, or serial).
      required: true
      example: drill
      selector:
        text:

check_out:
  name: Check out
  description: >-
    Check an item out of HomeHoard (mark it as not here / lent out) by name.
    Handy from automations or voice — "check out the drill".
  fields:
    name:
      name: Name
      description: The item to check out (name, label, brand, model, or serial).
      required: true
      example: drill
      selector:
        text:

check_in:
  name: Check in
  description: >-
    Check an item back into HomeHoard (mark it as here) by name.
  fields:
    name:
      name: Name
      description: The item to check back in.
      required: true
      example: drill
      selector:
        text:
