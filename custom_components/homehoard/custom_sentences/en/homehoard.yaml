# HomeHoard voice sentences for Home Assistant Assist.
#
# Copy this file to:  <your HA config>/custom_sentences/en/homehoard.yaml
# then restart Home Assistant. You can then ask Assist things like:
#   "where is my drill"   "find the passport"   "where are the batteries"
language: "en"
intents:
  HomeHoardLocate:
    data:
      - sentences:
          - "where is [my|the|our] {name}"
          - "where are [my|the|our] {name}"
          - "where's [my|the|our] {name}"
          - "find [my|the|our] {name}"
          - "locate [my|the|our] {name}"
          - "which [bin|box|location] [is|has] [the] {name}"
  HomeHoardCheckOut:
    data:
      - sentences:
          - "check out [my|the|our] {name}"
          - "check {name} out"
          - "[I'm|I am] [borrowing|taking] [my|the|our] {name}"
          - "take out [my|the|our] {name}"
          - "lend [out] [my|the|our] {name}"
  HomeHoardCheckIn:
    data:
      - sentences:
          - "check in [my|the|our] {name}"
          - "check {name} in"
          - "[put back|return] [my|the|our] {name}"
          - "[I'm|I am] [returning|putting back] [my|the|our] {name}"
          - "{name} is back"
  HomeHoardContents:
    data:
      - sentences:
          - "what's in [my|the|our] {name}"
          - "what is in [my|the|our] {name}"
          - "what's inside [my|the|our] {name}"
          - "[list] [the] contents of [my|the|our] {name}"
          - "what do I have in [my|the|our] {name}"
lists:
  name:
    wildcard: true
