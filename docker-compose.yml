services:
  homehoard:
    build: .
    container_name: homehoard
    ports:
      - "7745:7745"
      # MCP server (for a Home Assistant MCP Client / other LLM clients).
      # Exposure is TOGGLEABLE via HBOX_MCP_BIND (set it in your .env):
      #   unset / 127.0.0.1  → published on the host's LOOPBACK only (safe default;
      #                        reachable by an HA instance on THIS host, not the LAN)
      #   0.0.0.0            → published on ALL interfaces (LAN) — only do this
      #                        with HBOX_MCP_SERVER_TOKEN set (see below)
      # To not run MCP at all, set HBOX_MCP_ENABLED=false (the process won't start).
      - "${HBOX_MCP_BIND:-127.0.0.1}:7766:7766"
    environment:
      # REQUIRED: a strong random secret (>= 32 bytes). The app refuses to boot
      # with a default when auth is enabled. Put it in a .env file next to this
      # compose file, e.g.  HBOX_SECRET_KEY=$(openssl rand -base64 48)
      HBOX_SECRET_KEY: "${HBOX_SECRET_KEY:?set HBOX_SECRET_KEY to a long random string}"
      # Set to "true" ONLY when running behind Home Assistant ingress / a trusted
      # authenticating proxy — it disables authentication entirely.
      HBOX_DISABLE_AUTH: "false"
      HBOX_ALLOW_REGISTRATION: "true"
      # Trusted reverse-proxy hop count. 0 = direct exposure (don't trust
      # X-Forwarded-For — it's spoofable). Set to 1+ ONLY if a real proxy
      # (nginx/Traefik) sits in front and sets XFF.
      HBOX_PROXY_HOPS: "0"
      # Optional: restrict CORS to your frontend origin(s); leave unset for same-origin.
      # HBOX_CORS_ORIGINS: "https://inventory.example.com"
      # --- Storage backend ---
      # Default (unset) = embedded SQLite in the /data volume — zero-config, the
      # right choice for most. To use the optional `postgres` service below,
      # uncomment this AND the service + depends_on + volume at the bottom:
      # HBOX_DATABASE_URL: "postgresql+psycopg://homehoard:homehoard@postgres:5432/homehoard"
    # depends_on:
    #   postgres:
    #     condition: service_healthy
      # --- MCP server (Home Assistant / LLM tool endpoint) ---
      # Run the MCP server? (default true). Set false to disable it entirely.
      HBOX_MCP_ENABLED: "${HBOX_MCP_ENABLED:-true}"
      # REQUIRED if you set HBOX_MCP_BIND=0.0.0.0 (LAN-exposed): a bearer token
      # the MCP endpoint then demands. Leave unset only for loopback-only use.
      # HBOX_MCP_SERVER_TOKEN: "${HBOX_MCP_SERVER_TOKEN}"
    volumes:
      - homehoard-data:/data
    restart: unless-stopped

  # Optional external Postgres. Uncomment this service, the `depends_on` and
  # `HBOX_DATABASE_URL` above, and the `postgres-data` volume below. HomeHoard
  # creates and migrates its schema automatically on first start.
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: homehoard
  #     POSTGRES_PASSWORD: homehoard
  #     POSTGRES_DB: homehoard
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U homehoard"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #   restart: unless-stopped

volumes:
  homehoard-data:
  # postgres-data:
