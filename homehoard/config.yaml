name: HomeHoard
version: "1.0.3"
slug: homehoard
description: Home inventory & organization — a personal rewrite of homebox with QR/barcode and Home Assistant support
url: https://github.com/Amantux/homehoard
# Pull the multi-arch image published by CI instead of building on-device.
image: ghcr.io/amantux/homehoard
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
ingress: true
ingress_port: 7745
panel_icon: mdi:package-variant-closed
panel_title: HomeHoard
# Advertise to Home Assistant so the companion integration auto-discovers us.
discovery:
  - homehoard
# Expose the MCP server (SSE) so the Home Assistant MCP Client can connect.
ports:
  7766/tcp: 7766
ports_description:
  7766/tcp: HomeHoard MCP server (SSE) for the Home Assistant MCP Client
map:
  - share:rw
options:
  disable_auth: true
  allow_registration: false
  enable_mcp: true
schema:
  disable_auth: bool
  allow_registration: bool
  enable_mcp: bool
