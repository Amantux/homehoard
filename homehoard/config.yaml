name: HomeHoard
version: "1.0.5"
slug: homehoard
description: Home inventory & organization — a personal rewrite of homebox with QR/barcode and Home Assistant support
url: https://github.com/Amantux/homehoard
# Pull the multi-arch image published by CI instead of building on-device.
image: ghcr.io/amantux/homehoard
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
ingress: true
ingress_port: 7745
panel_icon: mdi:package-variant-closed
panel_title: HomeHoard
# Advertise to Home Assistant so the companion integration auto-discovers us.
discovery:
  - homehoard
# NOTE: the MCP server (SSE :7766) is intentionally NOT published to the host.
# Everything reaches HomeHoard inside Home Assistant's boundary: the UI/API via
# Ingress (port 7745, authenticated by HA), and the MCP server only over the
# internal Supervisor network — Home Assistant's MCP Client connects to it by
# the add-on's container hostname (http://<slug>-homehoard:7766/sse), so 7766 is
# never exposed on the host/LAN.
map:
  - share:rw
options:
  disable_auth: true
  allow_registration: false
  enable_mcp: true
schema:
  disable_auth: bool
  allow_registration: bool
  enable_mcp: bool
