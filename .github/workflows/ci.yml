name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run pytest
        working-directory: backend
        run: pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  validate-addon:
    name: Validate add-on + integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate config.yaml / manifest.json / repository.yaml
        run: |
          pip install pyyaml
          python3 - <<'PY'
          import json, yaml, sys
          cfg = yaml.safe_load(open("homehoard/config.yaml"))
          for f in ("name", "version", "slug", "image", "arch"):
              assert f in cfg, f"config.yaml missing {f}"
          man = json.load(open("custom_components/homehoard/manifest.json"))
          assert man["domain"] == "homehoard"
          # add-on version and integration version must stay in lockstep
          assert str(cfg["version"]) == str(man["version"]), (
              f"version mismatch: config={cfg['version']} manifest={man['version']}"
          )
          yaml.safe_load(open("repository.yaml"))
          print("add-on config OK, version", cfg["version"])
          PY

  lint:
    name: Lint (ruff + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ruff (backend)
        run: |
          pip install "ruff==0.15.12"
          ruff check backend
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: ESLint (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm run lint

  smoke:
    name: Container smoke (build → readiness → shutdown)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build production image (amd64, load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: homehoard:ci
      - name: Start stack and wait for READINESS (not just process start)
        run: |
          set -euo pipefail
          docker run -d --name hh-ci -p 7745:7745 \
            -e HBOX_SECRET_KEY="$(openssl rand -base64 48)" homehoard:ci
          ok=""
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:7745/api/v1/ready >/dev/null 2>&1; then
              echo "ready after ${i} attempt(s)"; ok=1; break
            fi
            sleep 2
          done
          if [ -z "$ok" ]; then echo "NEVER BECAME READY"; docker logs hh-ci; exit 1; fi
      - name: Smoke tests (liveness, readiness body, MCP process, non-root)
        run: |
          set -euo pipefail
          curl -fsS http://127.0.0.1:7745/api/v1/status | tee smoke-status.json
          echo; curl -fsS http://127.0.0.1:7745/api/v1/ready | tee smoke-ready.json
          echo
          # Main process (pid 1 = gunicorn via gosu) must be non-root (uid 1000).
          uid=$(docker exec hh-ci sh -c "awk '/^Uid:/{print \$2}' /proc/1/status")
          echo "pid1 uid=$uid"; test "$uid" = "1000"
          # MCP server must be listening on 7766 inside the container.
          docker exec hh-ci python3 -c "import socket;s=socket.socket();s.settimeout(3);s.connect(('127.0.0.1',7766));print('mcp listening')"
      - name: Clean shutdown within grace period
        run: |
          set -euo pipefail
          docker stop -t 15 hh-ci
          rc=$(docker inspect -f '{{.State.ExitCode}}' hh-ci)
          echo "exit code: $rc"
      - name: Container logs (on failure)
        if: failure()
        run: docker logs hh-ci || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-logs
          path: smoke-*.json
          if-no-files-found: ignore

  # Auto-bump the patch version on every push to main (skips its own commit).
  bump-version:
    name: Auto-bump patch version
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    needs: [backend-tests, frontend-build, validate-addon, lint, smoke]
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      bump_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Bump patch version in config.yaml + manifest.json
        id: bump
        run: |
          python3 - <<'PY'
          import json, re, os

          cfg_path = "homehoard/config.yaml"
          man_path = "custom_components/homehoard/manifest.json"

          text = open(cfg_path).read()
          m = re.search(r'^version:\s*"?([0-9]+\.[0-9]+\.[0-9]+)"?', text, re.M)
          old = m.group(1)
          parts = old.split("."); parts[-1] = str(int(parts[-1]) + 1)
          new = ".".join(parts)

          text = re.sub(r'^(version:\s*).*$', f'\\1"{new}"', text, count=1, flags=re.M)
          open(cfg_path, "w").write(text)

          man = json.load(open(man_path))
          man["version"] = new
          with open(man_path, "w") as f:
              json.dump(man, f, indent=2); f.write("\n")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"old_version={old}\nnew_version={new}\n")
          print(f"Bumped {old} -> {new}")
          PY
      - name: Commit version bump
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homehoard/config.yaml custom_components/homehoard/manifest.json
          git commit -m "chore: bump version ${{ steps.bump.outputs.old_version }} → ${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:${{ github.ref_name }}
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # Build each architecture on a NATIVE runner (no QEMU). QEMU-emulated arm64
  # builds of the Node+Python image were so slow they hit the 6-hour job limit
  # and got cancelled. ubuntu-24.04-arm is a free native arm64 runner for public
  # repos, so both arches build in minutes.
  docker-build:
    name: Build & push (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    if: >
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    needs: [bump-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push per-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          # Per-arch tags; merged into a multi-arch manifest by the next job.
          tags: |
            ghcr.io/amantux/homehoard:${{ needs.bump-version.outputs.new_version }}-${{ matrix.arch }}
            ghcr.io/amantux/homehoard:latest-${{ matrix.arch }}

  merge-manifest:
    name: Merge multi-arch manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    needs: [bump-version, docker-build]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifests
        run: |
          V=${{ needs.bump-version.outputs.new_version }}
          docker buildx imagetools create \
            --tag ghcr.io/amantux/homehoard:${V} \
            --tag ghcr.io/amantux/homehoard:latest \
            ghcr.io/amantux/homehoard:${V}-amd64 \
            ghcr.io/amantux/homehoard:${V}-arm64
          echo "Published ghcr.io/amantux/homehoard:${V} (amd64 + arm64)"

  # Cut a GitHub Release/tag per version so HACS surfaces clean update prompts.
  # Tags the bump commit (whose manifest.json already holds the new version) and
  # only runs once the image is published, so a release always has a matching
  # ghcr image + integration source.
  release:
    name: GitHub release (HACS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    needs: [bump-version, merge-manifest]
    steps:
      - name: Create release v${{ needs.bump-version.outputs.new_version }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ needs.bump-version.outputs.new_version }}
          SHA: ${{ needs.bump-version.outputs.bump_sha }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "v${V}" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release v${V} already exists — skipping."
          else
            gh release create "v${V}" \
              --repo "$REPO" \
              --target "$SHA" \
              --title "v${V}" \
              --notes "HomeHoard ${V} — Home Assistant add-on & HACS integration. Container image: ghcr.io/amantux/homehoard:${V}"
            echo "Created release v${V} at ${SHA}"
          fi
