name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run pytest
        working-directory: backend
        run: pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  validate-addon:
    name: Validate add-on + integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate config.yaml / manifest.json / repository.yaml
        run: |
          pip install pyyaml
          python3 - <<'PY'
          import json, yaml, sys
          cfg = yaml.safe_load(open("homehoard/config.yaml"))
          for f in ("name", "version", "slug", "image", "arch"):
              assert f in cfg, f"config.yaml missing {f}"
          man = json.load(open("custom_components/homehoard/manifest.json"))
          assert man["domain"] == "homehoard"
          # add-on version and integration version must stay in lockstep
          assert str(cfg["version"]) == str(man["version"]), (
              f"version mismatch: config={cfg['version']} manifest={man['version']}"
          )
          yaml.safe_load(open("repository.yaml"))
          print("add-on config OK, version", cfg["version"])
          PY

  # Auto-bump the patch version on every push to main (skips its own commit).
  bump-version:
    name: Auto-bump patch version
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    needs: [backend-tests, frontend-build, validate-addon]
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Bump patch version in config.yaml + manifest.json
        id: bump
        run: |
          python3 - <<'PY'
          import json, re, os

          cfg_path = "homehoard/config.yaml"
          man_path = "custom_components/homehoard/manifest.json"

          text = open(cfg_path).read()
          m = re.search(r'^version:\s*"?([0-9]+\.[0-9]+\.[0-9]+)"?', text, re.M)
          old = m.group(1)
          parts = old.split("."); parts[-1] = str(int(parts[-1]) + 1)
          new = ".".join(parts)

          text = re.sub(r'^(version:\s*).*$', f'\\1"{new}"', text, count=1, flags=re.M)
          open(cfg_path, "w").write(text)

          man = json.load(open(man_path))
          man["version"] = new
          with open(man_path, "w") as f:
              json.dump(man, f, indent=2); f.write("\n")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"old_version={old}\nnew_version={new}\n")
          print(f"Bumped {old} -> {new}")
          PY
      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homehoard/config.yaml custom_components/homehoard/manifest.json
          git commit -m "chore: bump version ${{ steps.bump.outputs.old_version }} → ${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:${{ github.ref_name }}

  docker-build:
    name: Build & push image (amd64 + arm64 / Raspberry Pi 5)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    needs: [bump-version]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (tagged with the bumped version + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Must be lowercase (Docker repo names); matches config.yaml image.
          tags: |
            ghcr.io/amantux/homehoard:${{ needs.bump-version.outputs.new_version }}
            ghcr.io/amantux/homehoard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
